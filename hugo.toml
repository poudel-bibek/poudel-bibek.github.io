[outputs]
home = ["HTML", "RSS", "JSON"]

[outputFormats.PDF]
mediaType = "application/pdf"
isPlainText = true
isHTML = false

[mediaTypes]
[mediaTypes."application/pdf"]
suffixes = ["pdf"]

# Allow raw HTML in markdown (needed for some math rendering)
[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
