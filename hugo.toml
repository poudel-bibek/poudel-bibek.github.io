baseURL = 'https://poudel-bibek.github.io'
languageCode = 'en-us'
title = ''
theme = 'PaperMod'

[params]
  defaultTheme = "light"
  ShowReadingTime = true
  ShowBreadCrumbs = false
  ShowPostNavLinks = false
  comments = false
  ShowShareButtons = false
  mainSections = ["posts", "pdfs"]
  
  # Favicon configuration
  [params.assets]
    disableFingerprinting = true
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"

  [params.homeInfoParams]
    Title = "👋 Hi, I am Bibek Poudel."

    Content0 = """I am a postdoctoral researcher at the [Connected Automated and Resilient Transportation (CART) Lab](https://engineering.purdue.edu/CARTLab) at Purdue University, where I work with [Dr. Yiheng Feng](https://engineering.purdue.edu/CCE/People/ptProfile?resource_id=244000). My research focuses on reinforcement learning (RL) for transportation and robotics, where I build systems that learn from experience to solve real-world problems."""

    Content1 = """I completed my Ph.D. in Computer Science from the University of Tennessee, Knoxville where I was advised by [Dr. Weizi Li](https://weizi-li.github.io/) in the [Fluidic City Lab](https://fluidic-city.github.io/). My doctoral research was supported by the [Center for Transportation Research](https://ctr.utk.edu/person/bibek-poudel/) and included collaborations with [EPIC Lab](https://epic.eecs.utk.edu/) and [MOSIS Lab](https://mosis.uga.edu/). My work in transportation includes agents developed in multi-agent simulation that improve traffic flow for safer, more efficient mobility. In robotics, I have worked on real time and human-in-the-loop control of physical systems."""

    Content2 = """Some things I have built:

- [alphatransit.app](https://alphatransit.app/) — an agent that designs city-scale transit routes
- [cowrite.io](https://cowrite.io/) — a tool that helps researchers publish faster"""

    Content5 = """For more details on my background and experiences, please check out my [resume](/pdfs/resume/). I sometimes write on my [blog](/blog/)."""

  [params.cover]
    hidden = true

