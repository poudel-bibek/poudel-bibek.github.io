baseURL = 'https://poudel-bibek.github.io'
languageCode = 'en-us'
title = ''
theme = 'PaperMod'

[params]
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowBreadCrumbs = false
  ShowPostNavLinks = false
  comments = false
  ShowShareButtons = false
  mainSections = ["posts", "pdfs"]
  
  # Favicon configuration
  [params.assets]
    disableFingerprinting = true
    favicon = "favicon.ico"
    favicon16x16 = "favicon-16x16.png"
    favicon32x32 = "favicon-32x32.png"
    apple_touch_icon = "apple-touch-icon.png"
    safari_pinned_tab = "safari-pinned-tab.svg"

  [params.homeInfoParams]
    Title = "👋 Hi! I am Bibek Poudel."
    Content1 = """I recently completed my Ph.D. in Computer Science at the [University of Tennessee, Knoxville](https://www.utk.edu/) where I was advised by [Dr. Weizi Li](https://weizi-li.github.io/) in the [Fluidic City Lab](https://fluidic-city.github.io). My doctoral research was supported by the [Center for Transportation Research](https://ctr.utk.edu/person/bibek-poudel/) and included collaborations with [EPIC Lab](https://epic.eecs.utk.edu/) and  [MOSIS Lab](https://mosis.uga.edu/)."""

    Content2 = """My research focuses on reinforcement learning (RL) for transportation and robotics, where I build systems that learn from experience to solve real world problems. In transportation, I have developed agents in multi-agent simulation that improve traffic flow for safer and more efficient mobility. In robotics, I have worked on real time and human-in-the-loop control of physical robotic systems."""

    Content3 = """My recent work includes [DeCoR](https://youtu.be/fmLydgvk2p4), a framework for jointly optimizing urban street design and traffic signal control, and [AlphaTransit](https://youtu.be/Z_cvsM0MqFs), an agent that designs city-scale transit routes for real-world urban networks."""

    Content5 = """For more details on my background and experiences, please check out my [resume](/pdfs/resume/). I am also building [cowrite](https://cowrite.io/), a tool that helps researchers publish faster. I sometimes write on my [blog](/archives)."""

  [params.cover]
    hidden = true

