{{- /* External links (http/https) and PDF pages (/pdfs/...) open in a new tab;
       other internal links navigate normally. */ -}}
{{- $newTab := or (strings.HasPrefix .Destination "http") (strings.HasPrefix .Destination "/pdfs") }}
<a href="{{ .Destination | safeURL }}"{{ with .Title }} title="{{ . }}"{{ end }}{{ if $newTab }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Text }}</a>
