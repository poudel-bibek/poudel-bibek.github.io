{{- define "main" }}

<header class="page-header">
  <h1>{{ .Title }}</h1>
</header>

<div class="post-content">
  {{ .Content }}
</div>

<div class="substack-tiles">
  {{ partial "substack_posts.html" 12 }}
</div>

<div class="substack-subscribe">
  <iframe src="https://poudell.substack.com/embed" width="480" height="150"
    style="border: 1px solid var(--border); border-radius: 8px; background: white; max-width: 100%;"
    frameborder="0" scrolling="no" title="Subscribe on Substack"></iframe>
</div>

{{- end }}
