<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #525659;
            overflow-y: auto;
        }
        #pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 0;
            gap: 8px;
        }
        #pdf-container canvas {
            display: block;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            max-width: 100%;
            height: auto;
        }
        #pdf-loading {
            color: #ccc;
            font-family: system-ui, sans-serif;
            font-size: 16px;
            padding: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="pdf-container">
        <div id="pdf-loading">Loading PDF&hellip;</div>
    </div>
    <script type="module">
        const PDFJS_VERSION = '4.10.38';
        const CDN = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VERSION}`;
        const { getDocument, GlobalWorkerOptions } = await import(`${CDN}/pdf.min.mjs`);
        GlobalWorkerOptions.workerSrc = `${CDN}/pdf.worker.min.mjs`;

        const container = document.getElementById('pdf-container');
        const loading = document.getElementById('pdf-loading');

        try {
            const pdf = await getDocument('{{ .Params.pdf }}').promise;
            loading.remove();

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const scale = 1.5;
                const viewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;
                container.appendChild(canvas);

                await page.render({ canvasContext: ctx, viewport }).promise;
            }
        } catch (err) {
            loading.textContent = 'Failed to load PDF. ';
            const link = document.createElement('a');
            link.href = '{{ .Params.pdf }}';
            link.textContent = 'Download instead';
            link.style.color = '#6bf';
            loading.appendChild(link);
        }
    </script>
</body>
</html>
