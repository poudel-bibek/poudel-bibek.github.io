{{- /* Rotating page banner: picks one of /static/banners/banner-1..6.jpg by day of year.
       Same banner site-wide for a given day; changes daily. Drop in new images with the
       same names (1600x500) to replace. */ -}}
<div class="page-banner-wrap">
  <img id="page-banner" class="page-banner" src="/banners/banner-1.jpg" alt="">
</div>
<script>
  (function () {
    var COUNT = 1;  // bump as more banners are added (banner-2.jpg, ...)
    var now = new Date();
    var start = new Date(now.getFullYear(), 0, 0);
    var day = Math.floor((now - start) / 86400000);
    var n = (day % COUNT) + 1;
    document.getElementById('page-banner').src = '/banners/banner-' + n + '.jpg';
  })();
</script>
